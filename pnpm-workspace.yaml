# pnpm blocks dependency build scripts by default (a security measure).
# These packages need their build/install scripts to work correctly:
#   esbuild / unrs-resolver -> vitest + vite-tsconfig-paths resolver
#   sharp                   -> Next.js image optimization
#   supabase                -> downloads the supabase CLI binary
allowBuilds:
  esbuild: true
  sharp: true
  supabase: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - vite@6.3.4 || 6.3.6 || 6.4.1 || 6.4.2 || 6.4.3
  - brace-expansion@1.1.12 || 1.1.13 || 2.0.2 || 2.0.3
  - next@15.3.3 || 15.3.6 || 15.3.7 || 15.3.9 || 15.4.5 || 15.4.7 || 15.5.10 || 15.5.13 || 15.5.14 || 15.5.15 || 15.5.16 || 15.5.18
  - '@eslint/plugin-kit@0.3.4'
  - playwright@1.55.1
  - tar@7.5.3 || 7.5.4 || 7.5.7 || 7.5.8 || 7.5.10 || 7.5.11 || 7.5.16
  - js-yaml@4.1.1 || 4.1.2
  - mdast-util-to-hast@13.2.1
  - minimatch@3.1.3 || 3.1.4 || 9.0.6 || 9.0.7
  - rollup@4.59.0
  - ajv@6.14.0 || 8.18.0
  - flatted@3.4.0 || 3.4.2
  - handlebars@4.7.9
  - picomatch@2.3.2 || 4.0.4
  - lodash-es@4.17.23 || 4.17.24
  - lodash@4.17.23 || 4.17.24
  - postcss@8.5.10
  - fast-uri@3.1.1 || 3.1.2
  - ws@8.20.1 || 8.21.0
  - vitest@3.2.6
  - '@babel/core@7.29.1'
