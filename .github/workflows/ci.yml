name: CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  checks: write
  pull-requests: write
on:
  pull_request:
    branches:
      - main
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  audit-dependencies:
    name: Audit dependencies for vulnerabilities
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests with coverage
        run: pnpm test:coverage
      - name: Upload unit test coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 3
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E tests with coverage
        run: pnpm test:e2e:coverage
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
      - name: Upload E2E coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: coverage-e2e/
          retention-days: 7
  deploy-to-vercel-preview-env:
    name: Deploy to Vercel Preview environment
    runs-on: ubuntu-24.04
    steps:
      - name: Show in-progress message in sticky comment
        id: show-in-progress-message
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            # Vercel Preview Environment
            Deployment in progress...
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Update Version Number in package.json
        run: npm --no-git-tag-version version 0.0.0-pr${{ github.event.number }}
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        env:
          NITRO_PRESET: vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        id: deploy-artifacts
        run: |
          previewUrl=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "previewUrl=$previewUrl" >> "$GITHUB_OUTPUT"
      - name: Show URL of PR-specific deployment in Sticky Comment
        id: show-url-in-pr
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            # Vercel Preview Environment
            Released ${{ github.sha }} to <${{ steps.deploy-artifacts.outputs.previewUrl }}>
      - name: Show deployment failure in sticky comment
        id: show-deplolyment-failure-in-pr
        if: failure() || cancelled()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            # Vercel Preview Environment
            Deployment failed.
